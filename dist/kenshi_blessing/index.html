 thuần khiết.",fullDescription:"Trên vùng hoang phế mục ruỗng này, chỉ thánh hỏa của Okran mới có thể thanh tẩy mọi dị đoan. Cầu nguyện với Thánh vương, lưỡi đao của bạn sẽ bốc lên thánh diễm bất diệt, nhưng cái giá của cuồng tín thường là mù quáng.",colorFrom:'from-amber-600',colorTo:'to-yellow-300',borderGlow:'hover:border-amber-500',bgGlow:'bg-amber-900/20',icon:(0,i.jsx)(h,{className:'w-12 h-12 text-amber-500'}),blessings:[{id:'okran_1',title:"Cơn thịnh nộ thánh hỏa",description:"Mọi vũ khí bạn nắm giữ đều sẽ nhận thánh hỏa thần thánh, khiến sinh vật phi nhân cảm thấy sợ hãi.",rarity:"Truyền thuyết",icon:(0,i.jsx)(h,{className:'w-8 h-8 text-amber-400'}),stats:[{name:"Sức mạnh",value:15},{name:"Sức hút",value:6}]},{id:'okran_2',title:"Tín đồ Okran cực đoan",description:"Đức tin của bạn vững như thánh giáp thần thánh, nhưng vì vậy não bộ cũng từ chối hiểu bất cứ điều gì phức tạp ngoài thánh điển Okran.",rarity:"Sử thi",icon:(0,i.jsx)(B,{className:'w-8 h-8 text-yellow-300'}),stats:[{name:"Ý chí",value:10},{name:"Trí tuệ",value:-9}]},{id:'okran_3',title:"Thân thể thánh hỏa",description:"Ngọn lửa thánh khiết rèn lại xương thịt của bạn; bạn trở thành vị thánh sống bước đi trên hoang địa, nước lửa không xâm, trăm độc không sợ.",rarity:"Truyền thuyết",icon:(0,i.jsx)(g,{className:'w-8 h-8 text-yellow-200'}),stats:[{name:"Thể chất",value:20},{name:"Ý chí",value:10}]},{id:'okran_4',title:"Cơn giận trừng phạt",description:"Mỗi lần chịu đòn đều nhóm lên thánh nộ phán xét dị đoan trong lòng bạn. Ngay khoảnh khắc giữ vững thế đứng, bạn sẽ bắt lấy sơ hở của địch, đáp trả bằng phản kích trừng phạt sắc bén hơn, biến đau đớn thành lưỡi đao chế tài.",rarity:"Hiếm",icon:(0,i.jsx)(C,{className:'w-8 h-8 text-amber-300'}),stats:[{name:"Sức mạnh",value:8},{name:"Thể chất",value:-6}]},{id:'okran_5',title:"Cự điêu thủ hộ thánh địa",description:"Chìm trong cuồng nhiệt bảo vệ thánh địa, đôi tay vung vũ khí của bạn tràn đầy sức mạnh, nhưng ánh mắt quá cuồng tín khiến người khác bất an.",rarity:"Sử thi",icon:(0,i.jsx)(f,{className:'w-8 h-8 text-amber-500'}),stats:[{name:"Sức mạnh",value:8},{name:"Sức hút",value:-8}]},{id:'okran_6',title:"Thanh tu tuyệt niệm",description:"Từ chối khoái lạc xác thịt và mọi cám dỗ bóng tối, tình yêu của Đấng Tạo Hóa ban cho bạn ý chí và khả năng nhìn thấu vượt khỏi thế tục, nhưng bạn ngày càng khó đồng cảm với những giao tiếp tình cảm của phàm nhân.",rarity:"Truyền thuyết",icon:(0,i.jsx)(v,{className:'w-8 h-8 text-yellow-300'}),stats:[{name:"Ý chí",value:12},{name:"Cảm nhận",value:12},{name:"Sức hút",value:-16}]},{id:'okran_7',title:"Cộng vinh thần thánh",description:"Ghi nhớ lời thề thần thánh tuyệt không làm hại đồng bào. Sự khiêm nhường ấy hóa thành sức phòng hộ không thể phá vỡ. Khi chống ngoại địch bạn bền bỉ vô cùng, nhưng quyết tâm vung đao giết chóc bên ngoài cũng bị suy yếu.",rarity:"Sử thi",icon:(0,i.jsx)(w,{className:'w-8 h-8 text-amber-200'}),stats:[{name:"Thể chất",value:20},{name:"Ý chí",value:10},{name:"Sức mạnh",value:-18}]},{id:'okran_8',title:"Tâm cuồng tự giới",description:"Cai bỏ rượu và chất gây ảo giác, bóng tối không còn săn mồi được bộ não đã tự ràng buộc của bạn; tâm trí vững chắc như pháo đài. Nhưng sự áp chế tuyệt đối luôn căng chặt khiến bạn đánh mất độ nhẹ và sự linh động của thân thể.",rarity:"Hiếm",icon:(0,i.jsx)(b,{className:'w-8 h-8 text-yellow-400'}),stats:[{name:"Ý chí",value:20},{name:"Nhanh nhẹn",value:-12}]},{id:'okran_9',title:"Thánh hỏa chấn kích",description:"Võ nghệ đỡ gạt của thánh giáo Okran. Vào khoảnh khắc đỡ hoàn hảo, bạn dẫn nhiệt nóng rực từ chuôi kiếm, khiến lưỡi địch và cả cánh tay hắn rung mạnh để lộ sơ hở.",rarity:"Thường",icon:(0,i.jsx)(C,{className:'w-8 h-8 text-amber-400'}),stats:[{name:"Sức mạnh",value:3},{name:"Ý chí",value:2}]},{id:'okran_10',title:"Pháo đài phòng thủ thành kính",description:"Thế thủ hoàn mỹ trang nghiêm thần thánh. Tuân theo bộ pháp vững chắc và đại khiên thần thánh trong thánh điển, bạn tìm lại sự yên ổn nội tâm giữa phòng tuyến nghiêm mật không thể công phá.",rarity:"Thường",icon:(0,i.jsx)(g,{className:'w-8 h-8 text-yellow-300'}),stats:[{name:"Thể chất",value:3},{name:"Ý chí",value:2}]},{id:'okran_11',title:"Kim quang thập tự phá",description:"Tuyệt kỹ phá vây của kỵ sĩ đoàn Okran. Lưỡi dao giao cắt cực nhanh vạch nên thập tự kim quang chói mắt, cuốn quét và dọn sạch kẻ địch xung quanh như một bức màn thánh diễm thần thánh.",rarity:"Sử thi",icon:(0,i.jsx)(h,{className:'w-8 h-8 text-amber-500'}),stats:[{name:"Nhanh nhẹn",value:6},{name:"Ý chí",value:4}]},{id:'okran_12',title:"Thánh giáo điển diệu",description:"Võ học chính thống của Okran. Không có cơ giáp hay dị biến thần quái nào, chỉ dựa vào thăng bằng thân pháp và tháo lực khớp đã tôi luyện qua trăm ngàn lần. Bằng góc chéo vàng đơn giản mà cứng rắn, bạn gạt bật cú chém nặng của địch rồi trở tay tung một đòn chính khí áp chế.",rarity:"Truyền thuyết",icon:(0,i.jsx)(C,{className:'w-8 h-8 text-yellow-200'}),stats:[{name:"Sức mạnh",value:8},{name:"Nhanh nhẹn",value:5}]},{id:'okran_13',title:"Hơi thở cầu sớm",description:"Những buổi cầu nguyện dài và luyện thở chậm trước bình minh mỗi ngày khiến lồng ngực và tâm thần bạn ổn định hơn. Khi đối mặt hỗn loạn, bạn càng giữ được tiết tấu của bản thân.",rarity:"Thường",icon:(0,i.jsx)(v,{className:'w-8 h-8 text-amber-300'}),stats:[{name:"Ý chí",value:3},{name:"Thể chất",value:2}]},{id:'okran_14',title:"Nắm vững thánh ấn",description:"Thường xuyên nắm thánh huy và binh khí cầu nguyện khiến cổ tay bạn vững hơn, ra tay chính trực hơn. Mỗi lần khởi thế của bạn bớt một phần do dự, thêm một phần trang nghiêm.",rarity:"Thường",icon:(0,i.jsx)(g,{className:'w-8 h-8 text-yellow-300'}),stats:[{name:"Sức mạnh",value:2},{name:"Ý chí",value:3}]},{id:'okran_15',title:"Ấn Thệ Ước Thánh Hỏa",description:"Khắc Ấn Thệ Ước Thánh Hỏa của Okran vào linh hồn. Phần thưởng: từ đây có tư cách gánh ân phúc truyền thuyết của Okran. Cái giá: linh hồn bạn sẽ bị thánh hỏa nhận là mồi lửa duy nhất, về sau khó còn được Kral, Narko và Bilak tiếp nhận. Mục này không tiêu hao điểm đặc tính; hãy xác nhận lần nữa khi ban cho nhân vật.",traitDescription:"Ấn Thệ Ước Thánh Hỏa của Okran đã khắc vào linh hồn. Bạn được xem là mồi lửa duy nhất của thánh hỏa; từ đây có tư cách gánh ân phúc truyền thuyết của Okran.",displayRarity:"Truyền thuyết (tiền đề mở khóa)",rarity:"Truyền thuyết",icon:(0,i.jsx)(h,{className:'w-8 h-8 text-amber-400'}),stats:[{name:"Ý chí",value:8}]}]},{id:'kral',name:"Kral",title:"Thần Vinh dự",description:"Hiện thân của sức mạnh và vinh quang, tìm kiếm bất hủ giữa máu tươi và xương vỡ.",fullDescription:"Chỉ kẻ hèn mới cầu nơi che chở! Kral che chở những chiến binh vẫn vung vũ khí trong tuyệt cảnh. Hãy đổ máu, gầm lên, vứt bỏ thứ lý trí và dối trá đáng thương, rồi dùng sọ kẻ địch đúc nên ngai vàng của bạn!",colorFrom:'from-red-900',colorTo:'to-red-500',borderGlow:'hover:border-red-600',bgGlow:'bg-red-950/30',icon:(0,i.jsx)(x,{className:'w-12 h-12 text-red-500'}),blessings:[{id:'kral_1',title:"Chiến hồn bất khuất",description:"Trong chém giết vô tận, bạn dần quên cả suy nghĩ lẫn đau đớn. Mỗi lần trọng thương chỉ khiến linh hồn bạn cứng cỏi hơn, thân thể ngày càng khó bị phá hủy.",rarity:"Truyền thuyết",icon:(0,i.jsx)(y,{className:'w-8 h-8 text-red-600'}),stats:[{name:"Thể chất",value:15},{name:"Ý chí",value:15},{name:"Trí tuệ",value:-8}]},{id:'kral_3',title:"Cuồng nộ gãy xương",description:"Mỗi khi một khúc xương gãy hoặc chịu trọng thương, bạn sẽ rơi vào cơn cuồng nộ khát máu không thể kiềm chế, sức mạnh tăng vọt. Nhưng lúc đó bạn hoàn toàn mất lý trí, chỉ biết tấn công.",rarity:"Hiếm",icon:(0,i.jsx)(k,{className:'w-8 h-8 text-orange-200'}),stats:[{name:"Sức mạnh",value:12},{name:"Trí tuệ",value:-8}]},{id:'kral_4',title:"Bạo chúa chiến trường",description:"Bạn hòa dã tính, võ dũng và khí phách vương giả của Kral vào máu thịt. Chém giết càng thảm liệt càng kích phát uy áp thống ngự chiến trường và sức phá hoại của bạn; chỉ là bản năng đấu tranh quá mạnh ấy khiến bạn khó kiềm chế, khó sống hòa nhã với người khác.",rarity:"Truyền thuyết",icon:(0,i.jsx)(x,{className:'w-8 h-8 text-red-500'}),stats:[{name:"Sức mạnh",value:20},{name:"Thể chất",value:18},{name:"Ý chí",value:18},{name:"Trí tuệ",value:-14},{name:"Sức hút",value:-18}]},{id:'kral_5',title:"Cuồng hoan máu thịt",description:"Máu của kẻ địch bạn giết khiến thân thể bạn linh hoạt hơn, nhưng cũng làm bạn say trong mùi máu, bỏ quên nguy cơ ẩn trong bóng tối.",rarity:"Hiếm",icon:(0,i.jsx)(E,{className:'w-8 h-8 text-red-400'}),stats:[{name:"Nhanh nhẹn",value:9},{name:"Cảm nhận",value:-5}]},{id:'kral_6',title:"Lời thề quyết đấu",description:"Vinh dự là quyết đấu đường đường chính chính. Bạn vứt bỏ mọi lén lút và tập kích âm hiểm, vĩnh viễn chỉ chính diện tuyên cáo tử đấu. Sức mạnh của bạn như chẻ tre, nhưng hành động bí mật với bạn hoàn toàn trở thành điều bất khả.",rarity:"Sử thi",icon:(0,i.jsx)(C,{className:'w-8 h-8 text-red-400'}),stats:[{name:"Sức mạnh",value:15},{name:"Nhanh nhẹn",value:-12}]},{id:'kral_7',title:"Tiếng gầm phá nồi dìm thuyền",description:"Đào binh là nỗi nhục lớn nhất của tín đồ Kral. Bạn chặt đứt mọi ý nghĩ bỏ chạy của bản thân; dù đối mặt vực sâu vẫn bộc phát ý chí cuồng nhiệt không thể lay chuyển, nhưng cũng vì không bao giờ lùi bước mà mất khả năng cơ động kéo giãn thế trận.",rarity:"Truyền thuyết",icon:(0,i.jsx)(k,{className:'w-8 h-8 text-red-500'}),stats:[{name:"Ý chí",value:34},{name:"Nhanh nhẹn",value:-18}]},{id:'kral_8',title:"Nghênh kích vô úy",description:"Mọi lẩn trốn và che chắn đều là báng bổ vinh dự. Theo bản năng, bạn dùng lồng ngực đón lưỡi đao kẻ địch; sự cương mãnh liều mạng này khiến thể phách bạn mạnh mẽ, nhưng cũng hoàn toàn từ bỏ mọi kỹ xảo né tránh phòng thủ.",rarity:"Hiếm",icon:(0,i.jsx)(g,{className:'w-8 h-8 text-orange-400'}),stats:[{name:"Thể chất",value:12},{name:"Nhanh nhẹn",value:-10}]},{id:'kral_9',title:"Trọng kích ngạo lập",description:"Võ nghệ cứng đối cứng ngang ngược và ít suy tính nhất. Bạn chém thẳng xuống với thế nặng vạn cân, dựa vào sức mạnh thuần túy cưỡng đoạt mọi khoảng trống đỡ gạt của đối thủ.",rarity:"Thường",icon:(0,i.jsx)(C,{className:'w-8 h-8 text-red-400'}),stats:[{name:"Sức mạnh",value:8}]},{id:'kral_10',title:"Kẻ không lùi",description:"Thế đỡ bàn thạch thề chết không lùi. Hai chân đạp nặng xuống mặt đất, dùng cốt thép tuyệt đối không lùi, không né, không lệch để chính diện chấn ngược vũ khí đối thủ.",rarity:"Thường",icon:(0,i.jsx)(g,{className:'w-8 h-8 text-red-300'}),stats:[{name:"Thể chất",value:8}]},{id:'kral_11',title:"Vũ điệu cuồng lan của đấu sĩ",description:"Hấp thu chiến ý trong tử đấu võ đài chính diện không giữ lại gì. Lưỡi đao hóa thành những trọng trảm đáng sợ liên miên không dứt; trong lúc cứng rắn đỡ vũ khí địch, bạn dùng thế công không thể cản để áp chế đối phương đến chết.",rarity:"Sử thi",icon:(0,i.jsx)(k,{className:'w-8 h-8 text-orange-400'}),stats:[{name:"Sức mạnh",value:6},{name:"Thể chất",value:6}]},{id:'kral_12',title:"Ngai vàng tối thượng",description:"Đẩy vinh quang và chiến ý của Kral lên cực đỉnh. Khi chính diện va nát và gạt bật binh khí địch, bạn làm rung tận gân xương toàn thân, lập tức bổ ra một cú trọng trảm vương giả tưởng như đủ chém mở núi sông và sinh linh.",rarity:"Truyền thuyết",icon:(0,i.jsx)(C,{className:'w-8 h-8 text-red-600'}),stats:[{name:"Sức mạnh",value:25},{name:"Ý chí",value:-8}]},{id:'kral_13',title:"Sói cô độc tắm máu",description:"Kế thừa ý chí tử chiến cô cao khi Kral dẫn vài người chặn hậu trước đại quân hàng vạn. Địch càng đông bạn càng không sợ; càng chém giết trong chiến đấu, cảm giác đau càng bị chiến ý dâng cao chặn đứng hoàn toàn. Tuy vậy, sự tự phụ cô độc này cũng khiến tính khí bạn hung bạo và bài ngoại.",rarity:"Sử thi",icon:(0,i.jsx)(x,{className:'w-8 h-8 text-red-500'}),stats:[{name:"Thể chất",value:6},{name:"Ý chí",value:12},{name:"Sức hút",value:-14}]},{id:'kral_14',title:"Bước đạp nứt xương",description:"Bạn học được cách dùng bước chân nặng nề áp sát đối thủ; dù dưới chân toàn xương vụn và bùn máu cũng tuyệt không để khí thế lùi nửa phân.",rarity:"Thường",icon:(0,i.jsx)(k,{className:'w-8 h-8 text-red-300'}),stats:[{name:"Sức mạnh",value:4},{name:"Thể chất",value:2}]},{id:'kral_15',title:"Chiến hống tụ huyết",description:"Tiếng chiến hống ngắn và dữ khiến máu bạn nóng nhanh hơn. Tiếng gầm chưa chắc dọa được địch, nhưng đủ khiến chính bạn hung lên thêm ba phần.",rarity:"Thường",icon:(0,i.jsx)(x,{className:'w-8 h-8 text-orange-300'}),stats:[{name:"Ý chí",value:3},{name:"Sức mạnh",value:3}]},{id:'kral_16',title:"Chiến Khế Vương Huyết",description:"Khắc chiến khế của Kral vào tận tủy xương. Phần thưởng: từ đây có tư cách gánh ân phúc truyền thuyết của Kral. Cái giá: vinh quang của bạn sẽ bị đóng đinh trên vương đạo chính diện chém giết, về sau khó còn được Okran, Narko và Bilak thật sự tiếp nhận. Mục này không tiêu hao điểm đặc tính; hãy xác nhận lần nữa khi ban cho nhân vật.",traitDescription:"Chiến Khế Vương Huyết của Kral đã khắc vào tủy xương. Vinh quang của bạn bị buộc vào vương đạo quyết đấu chính diện; từ đây có tư cách gánh ân phúc truyền thuyết của Kral.",displayRarity:"Truyền thuyết (tiền đề mở khóa)",rarity:"Truyền thuyết",icon:(0,i.jsx)(x,{className:'w-8 h-8 text-red-500'}),stats:[{name:"Sức mạnh",value:8}]}]},{id:'narko',name:"Narko",title:"Thần Bóng tối",description:"Ma thần ẩn trong bóng tối, ban sự giảo hoạt và biến ảo cho những kẻ dám nhìn thẳng vào vực sâu.",fullDescription:"Ánh sáng quá chói mắt, nó che lấp lời dối trá. Hãy ngả vào vòng tay đêm tối; Narko sẽ dạy bạn cách múa trong bóng kẻ địch, hoặc âm thầm sống sót theo cách quỷ dị.",colorFrom:'from-purple-950',colorTo:'to-indigo-500',borderGlow:'hover:border-indigo-500',bgGlow:'bg-purple-950/30',icon:(0,i.jsx)(S,{className:'w-12 h-12 text-indigo-400'}),blessings:[{id:'narko_1',title:"Tiềm hành hư không",description:"Ẩn thân hoàn toàn trong bóng tối, thu hoạch sinh mạng như quỷ mị.",rarity:"Truyền thuyết",icon:(0,i.jsx)(f,{className:'w-8 h-8 text-indigo-300'}),stats:[{name:"Nhanh nhẹn",value:20}]},{id:'narko_2',title:"Hiện thân ác mộng",description:"Sự tồn tại của bạn tự thân đã là một nỗi sợ. Sinh vật nhìn thẳng vào mắt bạn sẽ cảm thấy âm hàn thấu xương. Nhưng ngay cả đồng minh cũng vì khó chịu sinh lý mà kính nhi viễn chi với bạn.",rarity:"Sử thi",icon:(0,i.jsx)(S,{className:'w-8 h-8 text-purple-400'}),stats:[{name:"Cảm nhận",value:12},{name:"Sức hút",value:-12}]},{id:'narko_3',title:"Cám dỗ nguyên tội",description:"Bạn tỏa ra khí tức vực sâu vừa quyến rũ vừa nguy hiểm, dễ dàng mê hoặc kẻ địch ý chí yếu phải nghe lệnh bạn, nhưng cũng khơi dậy dục vọng của kẻ cuồng tín, khiến chúng chiếm hữu bạn quá mức, chiếm hữu mọi thứ của bạn.",rarity:"Hiếm",icon:(0,i.jsx)(k,{className:'w-8 h-8 text-violet-300'}),stats:[{name:"Sức hút",value:12},{name:"Ý chí",value:-8}]},{id:'narko_4',title:"Kẻ gặt đêm tối",description:"Giết chóc trong đêm đen cung cấp cho bạn tinh lực cuồn cuộn không dứt; động tác của bạn trở nên nhanh nhẹn khác thường, nhưng khi bình minh đến bạn sẽ yếu ớt vô lực.",rarity:"Sử thi",icon:(0,i.jsx)(D,{className:'w-8 h-8 text-indigo-200'}),stats:[{name:"Nhanh nhẹn",value:12},{name:"Thể chất",value:-8}]},{id:'narko_5',title:"Nụ hôn lưỡi độc",description:"Mọi vũ khí bạn sở hữu đều sẽ nhận độc dịch.",rarity:"Hiếm",icon:(0,i.jsx)(C,{className:'w-8 h-8 text-purple-500'}),stats:[{name:"Nhanh nhẹn",value:4}]},{id:'narko_6',title:"Tái tạo trong bóng",description:"Khi ở trong bóng râm, vết thương của bạn lành lại với tốc độ mắt thường thấy được; cái giá là dù chỉ chút ánh nắng cũng sẽ thiêu rát da bạn.",rarity:"Sử thi",icon:(0,i.jsx)(g,{className:'w-8 h-8 text-violet-400'}),stats:[{name:"Thể chất",value:8},{name:"Sức mạnh",value:-8}]},{id:'narko_7',title:"Mộng yểm cuồng ngữ",description:"Nếu kẻ địch sợ bạn, bạn có thể khiến chúng cảm nhận nỗi sợ của bạn trong mơ, để chúng rơi vào vòng lặp ác mộng sống không bằng chết. Đổi lại, mí mắt của chính bạn cũng sẽ bị khâu vào đêm đen vô biên, không còn chịu nổi dù chỉ một tia nhìn chói rực.",rarity:"Truyền thuyết",icon:(0,i.jsx)(P,{className:'w-8 h-8 text-fuchsia-400'}),stats:[{name:"Sức hút",value:24},{name:"Ý chí",value:-15}]},{id:'narko_8',title:"Rắn độc hẻm tối",description:"Bạn lâu ngày lẩn lút giữa bóng tối và khe hở, quen cách mượn địa hình, tầm nhìn và tiểu xảo để giành lợi thế cho bản thân. Những kinh nghiệm sinh tồn không mấy đàng hoàng ấy khiến bạn hành động nhẹ và nhanh hơn, nhưng cũng làm thể phách mỏng đi qua tháng ngày hao mòn.",rarity:"Thường",icon:(0,i.jsx)(x,{className:'w-8 h-8 text-purple-500'}),stats:[{name:"Nhanh nhẹn",value:4},{name:"Cảm nhận",value:3},{name:"Thể chất",value:-3}]},{id:'narko_9',title:"Bước giả lùi bóng đổ",description:"Bộ pháp trường phái Narko cực kỳ lừa lọc. Khi binh khí va nhau, bạn luôn làm ra dáng sức cùng lực kiệt, lảo đảo trượt lùi vài bước để dụ đối thủ thừa thắng truy kích; thực ra bạn đang tích thế chờ phát, bắt sơ hở một chiêu chế địch.",rarity:"Truyền thuyết",icon:(0,i.jsx)(D,{className:'w-8 h-8 text-indigo-400'}),stats:[{name:"Nhanh nhẹn",value:18},{name:"Cảm nhận",value:8}]},{id:'narko_10',title:"Ác niệm tính cạn",description:"Narko ban cho bạn mưu kế âm độc bất chấp thủ đoạn. Theo bản năng, bạn sẽ tránh đối đầu chính diện, ưu tiên xé vào điểm yếu, nỗi bận tâm và nơi mong manh nhất của kẻ địch, buộc chúng lộ sơ hở và khuất phục.",rarity:"Sử thi",icon:(0,i.jsx)(C,{className:'w-8 h-8 text-violet-400'}),stats:[{name:"Cảm nhận",value:7},{name:"Nhanh nhẹn",value:3}]},{id:'narko_11',title:"Độc tâm xuyên khe",description:"Bạn luyện thành lối sát pháp cận thân cực kỳ âm hiểm và hiểm hóc. Trong hỗn chiến và giằng co, bạn luôn bắt được khe hở nhỏ nhất giữa giáp, khung xương và nhịp nối động tác, đưa đòn độc đã tẩm vào đúng điểm yếu đủ phá vỡ thế địch.",rarity:"Sử thi",icon:(0,i.jsx)(k,{className:'w-8 h-8 text-purple-400'}),stats:[{name:"Nhanh nhẹn",value:7},{name:"Cảm nhận",value:3}]},{id:'narko_16',title:"Giấu kim dưới bóng",description:"Bạn quen âm thầm sắp đặt những động tác nhỏ khó thấy trước giao tranh: đổi vị trí, che khuất, giấu vũ khí, mượn vật. Chúng chưa chắc đủ quyết định thắng thua, nhưng luôn giúp bạn chạm tới vị trí có lợi sớm hơn đối thủ một bước.",rarity:"Thường",icon:(0,i.jsx)(k,{className:'w-8 h-8 text-violet-300'}),stats:[{name:"Cảm nhận",value:2},{name:"Nhanh nhẹn",value:2}]},{id:'narko_12',title:"Cát chảy mị ảnh",description:"Ban cho bạn khả năng vô hình gieo rắc ảo ảnh sương mù khiến tinh thần mê man trong chiến đấu, làm đối thủ trước mặt lẫn lộn thật và ảo. Hư hư thực thực khiến người ta hoàn toàn không nắm được tung tích. Trong lúc đỡ hoàn hảo lưỡi địch, bạn tung ra một đòn phản phệ hiểm độc và tàn nhẫn nhất.",rarity:"Truyền thuyết",icon:(0,i.jsx)(S,{className:'w-8 h-8 text-indigo-300'}),stats:[{name:"Nhanh nhẹn",value:18},{name:"Cảm nhận",value:8}]},{id:'narko_13',title:"Áp bộ khe bóng",description:"Bạn quen lách bước mượn vị trí ở rìa bóng tối, khiến đường nét bản thân luôn mờ hơn dự đoán của người khác nửa nhịp, như thể lúc nào cũng chỉ thiếu nửa tấc mới bị bắt được.",rarity:"Thường",icon:(0,i.jsx)(D,{className:'w-8 h-8 text-violet-300'}),stats:[{name:"Nhanh nhẹn",value:3},{name:"Cảm nhận",value:2}]},{id:'narko_14',title:"Dư quang đồng tử đêm",description:"Ở trong môi trường tối mờ quá lâu, đôi mắt bạn đã học cách đuổi theo phản quang yếu ớt. Đêm đen chưa chắc thuộc về bạn, nhưng bạn ít sợ nó hơn người thường.",rarity:"Thường",icon:(0,i.jsx)(f,{className:'w-8 h-8 text-indigo-300'}),stats:[{name:"Cảm nhận",value:5},{name:"Ý chí",value:1}]},{id:'narko_15',title:"Thánh Ngân Đêm Tối",description:"Để Thánh Ngân Đêm Tối của Narko phủ lên cái bóng của bạn. Phần thưởng: từ đây có tư cách gánh ân phúc truyền thuyết của Narko. Cái giá: linh hồn bạn sẽ dần hòa dòng với đêm đen, về sau khó còn được Okran, Kral và Bilak thật sự tiếp nhận. Mục này không tiêu hao điểm đặc tính; hãy xác nhận lần nữa khi ban cho nhân vật.",traitDescription:"Thánh Ngân Đêm Tối của Narko đã phủ lên cái bóng của bạn. Linh hồn bạn được đêm đen tiếp nhận; từ đây có tư cách gánh ân phúc truyền thuyết của Narko.",displayRarity:"Truyền thuyết (tiền đề mở khóa)",rarity:"Truyền thuyết",icon:(0,i.jsx)(S,{className:'w-8 h-8 text-indigo-300'}),stats:[{name:"Nhanh nhẹn",value:8}]}]},{id:'chitrin',name:"Chitrin",title:"Bậc thợ Skeleton đỉnh cấp",description:"Bậc thợ Skeleton lang thang giữa phế tích Cựu Đế Quốc, nắm giữ kỹ nghệ máy móc và trí khôn sinh tồn đã bị lãng quên.",fullDescription:"Máu thịt yếu mềm, chỉ kỹ nghệ và thép mới gần với vĩnh tồn. Chitrin không phải thần minh, mà là bậc thợ thủ công Skeleton hàng đầu trong dư âm kỹ nghệ Cựu Đế Quốc. Ông ta sẽ chỉ dẫn bạn khai quật di cấu, sửa chữa tàn tích, rèn lại trang bị, và sống sót trên hoang địa bằng cách lạnh lùng thực dụng nhất.",colorFrom:'from-emerald-950',colorTo:'to-teal-400',borderGlow:'hover:border-teal-400',bgGlow:'bg-emerald-950/30',icon:(0,i.jsx)(T,{className:'w-12 h-12 text-teal-400'}),blessings:[{id:'chitrin_1',title:"Người chơi lý thuyết Wikipedia",description:"Trong đầu bạn chứa bản thiết kế công nghệ và bí mật của cả thế giới, nhưng lâu ngày rời xa lao động thể lực khiến bạn yếu đến mức tay không trói nổi gà.",rarity:"Truyền thuyết",icon:(0,i.jsx)(N,{className:'w-8 h-8 text-teal-300'}),stats:[{name:"Trí tuệ",value:30},{name:"Sức mạnh",value:-12},{name:"Ý chí",value:-12}]},{id:'chitrin_3',title:"Thợ máy hoang địa",description:"Bạn hiểu sâu những kỹ năng sinh tồn thực dụng nhất hoang địa: tháo, sửa, ghép, vá. Dù là chi giả hỏng, máy phát cũ hay vũ khí giáp sắp rã, bạn đều có thể vắt ra giá trị để tiếp tục sống từ đống rác; chỉ là sống lâu với sắt vụn và linh kiện khiến bạn tin cờ lê và mỏ hàn hơn chuyện đối nhân xử thế.",rarity:"Hiếm",icon:(0,i.jsx)(k,{className:'w-8 h-8 text-emerald-400'}),stats:[{name:"Trí tuệ",value:10},{name:"Cảm nhận",value:5},{name:"Sức hút",value:-8}]},{id:'chitrin_4',title:"Cải tạo chi giả sắt vụn",description:"Bạn điên cuồng dùng linh kiện Skeleton rỉ sét thay thế chi thể lành lặn của bản thân, nhận sức mạnh kim loại không biết mệt, nhưng phản ứng đào thải kéo dài luôn khiến bạn đau đớn muốn chết.",rarity:"Hiếm",icon:(0,i.jsx)(T,{className:'w-8 h-8 text-teal-200'}),stats:[{name:"Sức mạnh",value:16},{name:"Thể chất",value:-9}]},{id:'chitrin_5',title:"Thợ trọng giáp tinh công",description:"Bạn biết cách dùng di cấu Cựu Đế Quốc và vật liệu hoang địa ghép nên trọng giáp thật sự chịu được thử thách chiến trường. Lớp bảo hộ bạn chế tạo chú trọng phân bổ lực, kết cấu liên kết và phòng hộ vị trí then chốt, nên giúp người mặc vẫn vững đáng tin khi gánh đòn nặng; nhưng lắp ráp nặng nề rốt cuộc vẫn kéo chậm động tác.",rarity:"Sử thi",icon:(0,i.jsx)(g,{className:'w-8 h-8 text-emerald-300'}),stats:[{name:"Thể chất",value:18},{name:"Nhanh nhẹn",value:-12}]},{id:'chitrin_6',title:"Giá chéo dòng trọng tâm",description:"Một thế cầm vũ khí đỡ chéo bình thường. Khi binh khí va nhau, bạn hơi nghiêng mặt lưỡi và góc cạnh, để man lực đập thẳng tới trượt lệch theo hướng nghiêng, tránh phải cứng đối cứng với lực thô bạo.",rarity:"Thường",icon:(0,i.jsx)(T,{className:'w-8 h-8 text-teal-300'}),stats:[{name:"Trí tuệ",value:5}]},{id:'chitrin_7',title:"Mượn lực đánh lực",description:"Một chiêu mượn lực đẩy ngược đơn giản. Ngay khoảnh khắc binh khí hai bên ghì nhau so lực, bạn thuận theo hướng đối thủ phát lực chưa ổn để đẩy gạt, khiến trọng tâm họ hơi chao và giành lại chút chủ động xoay xở.",rarity:"Thường",icon:(0,i.jsx)(E,{className:'w-8 h-8 text-emerald-300'}),stats:[{name:"Sức mạnh",value:5}]},{id:'chitrin_8',title:"Phá chiêu kích khe cổ tay",description:"Định vị chính xác góc chết phát lực khi đối thủ biến chiêu rồi đánh vào đó bằng lực khéo, có thể khiến họ đổi chiêu nửa chừng không trơn tru và buộc phải quay về thủ.",rarity:"Sử thi",icon:(0,i.jsx)(k,{className:'w-8 h-8 text-teal-400'}),stats:[{name:"Trí tuệ",value:8},{name:"Nhanh nhẹn",value:6}]},{id:'chitrin_9',title:"Liệu địch trước bước",description:"Thông qua nhìn thấu xu hướng chiến thuật tinh vi của đối thủ, bạn thực hiện chặn đòn và né tránh hoàn hảo ngay khoảnh khắc trước khi họ ra chiêu, đạt hiệu dụng thần dị của liệu địch trước một bước.",rarity:"Truyền thuyết",icon:(0,i.jsx)(N,{className:'w-8 h-8 text-emerald-200'}),stats:[{name:"Trí tuệ",value:10},{name:"Cảm nhận",value:5}]},{id:'chitrin_10',title:"Chip Mẫu Nhện",description:"Chitrin chỉ dẫn bạn biên dịch trong đầu bản thiết kế vi mô của nhện cơ sinh học Cựu Đế Quốc. Bạn có thể dùng sắt vụn, di hài Skeleton và pin kém chất lượng để chế tạo một con nhện sắt quân dụng cỡ nhỏ nghe lệnh bạn; cái giá là bạn sẽ mất cảm nhận về hơi ấm, lãng mạn và buồn vui phàm nhân.",rarity:"Sử thi",icon:(0,i.jsx)(T,{className:'w-8 h-8 text-teal-400'}),stats:[{name:"Trí tuệ",value:22},{name:"Cảm nhận",value:-12}]},{id:'chitrin_11',title:"Phòng vệ tĩnh điện",description:"Quanh cơ thể bạn hiện có dòng điện nhẹ. Trong chiến đấu, tĩnh điện có thể kích phát làm vật ném của đối phương lệch xoắn rất nhỏ, rời khỏi quỹ đạo ban đầu; người đến gần bạn sẽ bị điện giật nhẹ nhưng không chí mạng, khó lòng ôm lấy bạn.",rarity:"Sử thi",icon:(0,i.jsx)(E,{className:'w-8 h-8 text-emerald-300'}),stats:[{name:"Nhanh nhẹn",value:14},{name:"Sức hút",value:-10}]},{id:'chitrin_12',title:"Linh kiện hiệu chuẩn",description:"Bạn có thể nhanh chóng hiệu chuẩn khớp và kết cấu truyền động giữa những khe hở giao tranh, khiến mọi động tác chính xác và trơn tru hơn.",rarity:"Thường",icon:(0,i.jsx)(T,{className:'w-8 h-8 text-emerald-300'}),stats:[{name:"Trí tuệ",value:2},{name:"Nhanh nhẹn",value:3}]},{id:'chitrin_13',title:"Hiệu chuẩn mô-men",description:"Bạn có thói quen đặc biệt với góc phát lực và điểm chịu lực. Dù chỉ là một lần đỡ gạt mộc mạc nhất, bạn cũng sẽ điều chỉnh nó về vị trí tiết kiệm sức hơn.",rarity:"Thường",icon:(0,i.jsx)(T,{className:'w-8 h-8 text-teal-300'}),stats:[{name:"Trí tuệ",value:3},{name:"Sức mạnh",value:3}]},{id:'chitrin_15',title:"Ấn Kết Nối Cơ Hồn",description:"Để Chitrin khắc Ấn Kết Nối Cơ Hồn của Cựu Đế Quốc vào thần kinh và xương cốt của bạn. Phần thưởng: từ đây có tư cách gánh ân phúc truyền thuyết của Chitrin. Cái giá: khả năng thấu hiểu tình cảm, hơi ấm và tâm tư người khác của bạn sẽ dần trở nên trì độn, về sau khó còn được Okran, Kral, Narko và Bilak thật sự tiếp nhận. Mục này không tiêu hao điểm đặc tính; hãy xác nhận lần nữa khi ban cho nhân vật.",traitDescription:"Ấn Kết Nối Cơ Hồn của Chitrin đã khắc vào thần kinh và xương cốt của bạn. Khả năng thấu hiểu tình cảm và lòng người của bạn bắt đầu phai nhạt; từ đây có tư cách gánh ân phúc truyền thuyết của Chitrin.",displayRarity:"Truyền thuyết (tiền đề mở khóa)",rarity:"Truyền thuyết",icon:(0,i.jsx)(T,{className:'w-8 h-8 text-teal-300'}),stats:[{name:"Trí tuệ",value:8}]}]},{id:'yuri',name:"Bilak",title:"Ác ma thân vương",description:"Ác ma méo mó đến từ dị giới, đổi lý trí và dung mạo lấy ân ban máu thịt.",fullDescription:"Đừng nhìn thẳng vào toàn mạo của nó. Bilak là thân vương vực sâu đến từ chiều không gian chưa biết; nó vui lòng ban cho phàm nhân một sức mạnh đơn hạng tuyệt đối không gì sánh nổi, với điều kiện bạn chấp nhận chi thể dị hóa, giác quan vặn xoắn và linh hồn gào thét.",colorFrom:'from-fuchsia-900',colorTo:'to-pink-600',borderGlow:'hover:border-pink-600',bgGlow:'bg-fuchsia-950/30',icon:(0,i.jsx)(M,{className:'w-12 h-12 text-pink-500'}),blessings:[{id:'yuri_1',title:"Tay khỉ mỏ",description:"Hai tay dị hóa thành móng vuốt khổng lồ dị dạng, phình to thô kệch như khỉ mỏ. Sợi cơ cuồng bạo khiến lực nắm của bạn mạnh đến mức bóp nát giáp thép ròng, nhưng kết cấu xương khớp dị hóa hoàn toàn và thô lên khiến thao tác tinh vi với bạn thành thảm họa.",rarity:"Truyền thuyết",icon:(0,i.jsx)(M,{className:'w-8 h-8 text-pink-400'}),stats:[{name:"Sức mạnh",value:18},{name:"Nhanh nhẹn",value:-8},{name:"Sức hút",value:-12}]},{id:'yuri_2',title:"Đầu chó xương",description:"Đầu bạn cưỡng ép biến dị thành dáng vẻ chó xương, lực cắn xé kinh người và có giác quan dã thú, nhưng giờ bạn chỉ có thể gầm gừ rợn tóc gáy, lại thường không khống chế được mà chảy nước dãi hôi thối.",rarity:"Sử thi",icon:(0,i.jsx)(x,{className:'w-8 h-8 text-fuchsia-400'}),stats:[{name:"Sức mạnh",value:18},{name:"Trí tuệ",value:-8},{name:"Sức hút",value:-14}]},{id:'yuri_3',title:"Vỏ mù thú mỏ",description:"Đôi mắt bạn thoái hóa rồi hòa dính, mặt và ngực mọc ra lớp sừng sưng cứng như thú mỏ. Bạn gần như miễn nhiễm vết chí mạng ở đầu, nhưng tầm nhìn trở nên cực kỳ hẹp và ngoại hình đáng sợ.",rarity:"Sử thi",icon:(0,i.jsx)(g,{className:'w-8 h-8 text-pink-300'}),stats:[{name:"Thể chất",value:22},{name:"Cảm nhận",value:-14},{name:"Sức hút",value:-14}]},{id:'yuri_4',title:"Tăng sinh xúc tu đỏ thẫm",description:"Mỗi khi bị trọng thương, vết thương của bạn bùng ra xúc tu màu thịt buồn nôn để tái cấu trúc tốc độ cao. Điều này cho bạn tái sinh siêu tốc, nhưng mỗi lần tăng sinh đều kèm đau đớn tinh thần dữ dội, đẩy bạn ngày càng xa nhân loại.",rarity:"Truyền thuyết",icon:(0,i.jsx)(k,{className:'w-8 h-8 text-fuchsia-500'}),stats:[{name:"Thể chất",value:25},{name:"Ý chí",value:-14},{name:"Sức hút",value:-25}]},{id:'yuri_5',title:"Cụm mắt kép ký sinh",description:"Má và cổ bạn mọc chi chít mắt kép ký sinh màu tím sẫm, ban cho bạn thị lực động toàn phương cực kỳ phóng đại, nhưng cũng khiến mọi người nhìn thấy bạn cảm thấy buồn nôn sinh lý mãnh liệt.",rarity:"Hiếm",icon:(0,i.jsx)(f,{className:'w-8 h-8 text-pink-200'}),stats:[{name:"Cảm nhận",value:22},{name:"Nhanh nhẹn",value:8},{name:"Sức hút",value:-25}]},{id:'yuri_6',title:"Thân rùa",description:"Thân thể biến thành mai rùa đầm lầy; ngực và lưng bạn bị mai rùa bao phủ, nhận bảo vệ trọng giáp mai rùa nặng nề. Nhưng cũng vì thế mà hành động chậm chạp.",rarity:"Sử thi",icon:(0,i.jsx)(g,{className:'w-8 h-8 text-pink-500'}),stats:[{name:"Thể chất",value:15},{name:"Ý chí",value:10},{name:"Nhanh nhẹn",value:-12}]},{id:'yuri_6b',title:"Ác thú hoang dại",description:"Bilak đẩy bạn về hình thái săn giết hoàn mỹ theo hướng thú hóa. Cơ bắp, khung xương và bản năng cắn của bạn trong dị biến đều trở nên thích hợp hơn cho vồ giết và xé rách, khi chiến đấu sẽ bộc phát lực áp chế gần như hung thú hoang dại; cái giá là dáng vẻ thường ngày và khuôn mặt ngày càng lệch khỏi hình người, dần đánh mất năng lực suy nghĩ.",rarity:"Truyền thuyết",icon:(0,i.jsx)(x,{className:'w-8 h-8 text-pink-500'}),stats:[{name:"Sức mạnh",value:28},{name:"Thể chất",value:24},{name:"Ý chí",value:24},{name:"Sức hút",value:-40},{name:"Trí tuệ",value:-40}]},{id:'yuri_7',title:"Vuốt ngược xương mọc đảo",description:"Tuyệt học quấn đấu tay ngược méo mó với nhiều khớp mọc đảo. Hai vai và cổ tay bạn có thể tùy ý trật khớp, dùng tư thế phi nhân tuyệt đối quỷ dị để xoắn chặt và khóa cứng vũ khí đối phương.",rarity:"Thường",icon:(0,i.jsx)(M,{className:'w-8 h-8 text-pink-300'}),stats:[{name:"Thể chất",value:5}]},{id:'yuri_8',title:"Bom da dày",description:"Khi vài lớp bề mặt sừng dị biến dày bị thương hoặc bị chém, chúng lập tức gồ lên chịu ép, phát ra tiếng máu thịt bị ép xé chói tai, dùng lực đàn hồi thuần túy chấn ngược bật lưỡi đao ra.",rarity:"Thường",icon:(0,i.jsx)(j,{className:'w-8 h-8 text-fuchsia-300'}),stats:[{name:"Thể chất",value:5}]},{id:'yuri_9',title:"Cuồng phệ hàm nứt",description:"Dùng cái miệng gai xương đột ngột nứt ra trên thân thể hoặc cánh tay phụ dị dạng mọc cuồng loạn để kẹt cứng trường thương, đại kiếm đang bổ tới.",rarity:"Sử thi",icon:(0,i.jsx)(x,{className:'w-8 h-8 text-pink-400'}),stats:[{name:"Sức mạnh",value:6},{name:"Thể chất",value:4}]},{id:'yuri_10',title:"Gai sống lục chiến",description:"Đấu kỹ thân xác dị biến do Bilak ban. Khi bạn dựng đao đỡ, dưới sườn bên hông đột ngột mọc bạo vài gai sừng sắc nhọn dữ tợn, như nụ hôn khép lại của cự thú cắn chặt trọng kích từ trường binh đối phương, rồi thuận thế xé rách hủy diệt.",rarity:"Truyền thuyết",icon:(0,i.jsx)(M,{className:'w-8 h-8 text-fuchsia-500'}),stats:[{name:"Thể chất",value:10},{name:"Sức mạnh",value:5}]},{id:'yuri_10b',title:"Thân gai xương ngược",description:"Bilak chôn vào ngực bụng, hông sườn và sống lưng bạn một lớp gai xương mọc ngược sẽ bùng lên khi chịu ép. Một khi kẻ địch áp sát vồ giết, ôm ghì hoặc đè trọng kích xuống, những gai nhọn này sẽ nổ bật từ trong cơ thể bạn, theo khe máu thịt và giáp đâm ngược vào thân thể đối phương, như phản giáp sống vừa chịu thương vừa đáp trả bằng vết rách tàn nhẫn.",rarity:"Sử thi",icon:(0,i.jsx)(j,{className:'w-8 h-8 text-pink-400'}),stats:[{name:"Thể chất",value:8},{name:"Sức mạnh",value:4}]},{id:'yuri_11',title:"Lệch pha lớp sừng",description:"Lớp sừng dị biến sẽ co ngắn trước khi trúng đòn và lệch hướng xung kích, làm dịu chấn thương từ đòn chính diện, giúp bạn cứng cáp hơn trong hỗn chiến.",rarity:"Thường",icon:(0,i.jsx)(g,{className:'w-8 h-8 text-pink-300'}),stats:[{name:"Thể chất",value:3},{name:"Nhanh nhẹn",value:1}]},{id:'yuri_12',title:"Co giật chi phụ",description:"Nách và hông sườn bạn sẽ tạm thời phồng lên mầm thịt dị dạng khi giao chiến ác liệt, như thể có chi phụ sắp phá thân trồi ra. Chúng chưa thật sự thành hình, nhưng đã đủ quấy nhiễu phán đoán của đối thủ và giúp bạn giành nửa nhịp tiên cơ trong quấn đấu cận thân.",rarity:"Thường",icon:(0,i.jsx)(M,{className:'w-8 h-8 text-pink-300'}),stats:[{name:"Nhanh nhẹn",value:2},{name:"Sức mạnh",value:1}]},{id:'yuri_13',title:"Chi phụ phá kén",description:"Mầm thịt dị dạng vốn chỉ co giật phồng lên cuối cùng xé mở da thịt, mọc thành vài chi phụ bán thành hình ngắn ngủi và hung hãn. Chúng chưa đủ để độc lập vung đánh, nhưng đã có thể thay bạn xé, giật, đỡ, ngáng khi quấn sát, khiến bạn nguy hiểm hơn trước.",rarity:"Sử thi",icon:(0,i.jsx)(M,{className:'w-8 h-8 text-fuchsia-400'}),stats:[{name:"Nhanh nhẹn",value:5},{name:"Sức mạnh",value:3},{name:"Thể chất",value:2}]},{id:'yuri_14',title:"Bạo chúa chi phụ",description:"Những chi phụ bán thành hình cuối cùng không còn thỏa mãn với việc xé giật cận thân. Chúng hoàn toàn phá thân trồi ra, dọc theo hông sườn và sống lưng mọc thành vài cánh tay phụ dị biến thô bạo, thần kinh chất và đầy ác ý. Chúng sẽ đồng thời phát lực khi bạn đỡ, ôm ghì và vồ giết, khiến bạn như quái vật vực sâu săn mồi nhiều chi.",rarity:"Truyền thuyết",icon:(0,i.jsx)(M,{className:'w-8 h-8 text-pink-500'}),stats:[{name:"Sức mạnh",value:8},{name:"Nhanh nhẹn",value:6},{name:"Thể chất",value:4},{name:"Sức hút",value:-10}]},{id:'yuri_15',title:"Thể cộng sinh Huyết Nhện (ấu thể)",description:"Ấu thể Huyết Nhện ngủ sâu trong cột sống bạn, nối với thần kinh, mang đến cảm nhận nhạy bén và cơn âm ỉ ngày qua ngày; sức mạnh thật sự của nó dường như vẫn còn xa mới được khai phá.",rarity:"Thường",icon:(0,i.jsx)(M,{className:'w-8 h-8 text-pink-300'}),stats:[{name:"Cảm nhận",value:8},{name:"Thể chất",value:-10},{name:"Sức hút",value:-10}]},{id:'yuri_16',title:"Thể cộng sinh Huyết Nhện (trưởng thành)",description:"Ấu thể Huyết Nhện trong cột sống đã trưởng thành. Một phần chi nhện đỏ tươi đâm ra từ lưng bạn, sức mạnh cuộn chảy giữa xương và cơ bắp; đau đớn đang giảm đi, nhưng tiềm năng thật sự của nó dường như vẫn chưa hoàn toàn thức tỉnh.",rarity:"Sử thi",icon:(0,i.jsx)(M,{className:'w-8 h-8 text-fuchsia-400'}),stats:[{name:"Sức mạnh",value:6},{name:"Thể chất",value:6},{name:"Sức hút",value:-8}]},{id:'yuri_17',title:"Thể cộng sinh Huyết Nhện (trưởng lão)",description:"Huyết Nhện ký sinh trong cột sống bạn đã hoàn toàn trưởng thành. Bốn chi nhện hoàn chỉnh đỏ tươi và sắc bén duỗi ra từ sau lưng; bạn không còn cảm thấy đau, thậm chí có thể theo bản năng sai khiến những Huyết Nhện khác; nhưng cơn đói đi kèm cũng đang gặm nhấm lý trí của bạn.",rarity:"Truyền thuyết",icon:(0,i.jsx)(M,{className:'w-8 h-8 text-red-500'}),stats:[{name:"Sức mạnh",value:10},{name:"Nhanh nhẹn",value:10},{name:"Thể chất",value:10},{name:"Trí tuệ",value:-12},{name:"Sức hút",value:-12}]},{id:'yuri_18',title:"Ấn Khế Bào Thai Vực Sâu",description:"Để Bilak khâu Ấn Khế Bào Thai Vực Sâu vào máu thịt của bạn. Phần thưởng: từ đây có tư cách gánh ân phúc truyền thuyết của Bilak. Cái giá: thân thể bạn sẽ bị vực sâu xem như luống ấm nuôi dị biến, về sau khó còn được Okran, Kral và Narko thật sự tiếp nhận. Mục này không tiêu hao điểm đặc tính; hãy xác nhận lần nữa khi ban cho nhân vật.",traitDescription:"Ấn Khế Bào Thai Vực Sâu của Bilak đã được khâu vào máu thịt của bạn. Thân thể bạn bị vực sâu nhận là luống ấm; từ đây có tư cách gánh ân phúc truyền thuyết của Bilak.",displayRarity:"Truyền thuyết (tiền đề mở khóa)",rarity:"Truyền thuyết",icon:(0,i.jsx)(L,{className:'w-8 h-8 text-pink-400'}),stats:[{name:"Thể chất",value:8}]}]},{id:'beep',name:"Beep",title:"Thần Vui vẻ",description:"Chiến binh mạnh nhất hoang địa (tự phong), mang đến ân ban vô lý phá vỡ bức tường thứ tư.",fullDescription:"Beep! Beep là mạnh nhất! Đi theo bước chân của Beep, bạn sẽ có sức mạnh kỳ diệu phá vỡ bức tường thứ tư. Đừng quá nghiêm túc với cái thế giới mục nát này; dù sao vui vẻ mới là quy tắc sinh tồn số một trên hoang địa!",colorFrom:'from-lime-500',colorTo:'to-green-400',borderGlow:'hover:border-green-500',bgGlow:'bg-lime-950/30',icon:(0,i.jsx)(P,{className:'w-12 h-12 text-green-400'}),blessings:[{id:'beep_kral_2',title:"Cuồng chiến sĩ thiếu thân não",description:"Bạn dùng toàn bộ thời gian để vung vũ khí nặng, cơ bắp lấp đầy khoảng không đáng lẽ thuộc về não; đếm quá mười đầu ngón tay là đau đầu.",rarity:"Sử thi",icon:(0,i.jsx)(j,{className:'w-8 h-8 text-red-400'}),stats:[{name:"Sức mạnh",value:10},{name:"Trí tuệ",value:-9}]},{id:'beep_chitrin_2',title:"Cuồng chứng máy móc phi thăng",description:"Bạn tin chắc “máu thịt yếu mềm, máy móc phi thăng”, dùng ý chí thép ép bản thân phớt lờ đau đớn, nhưng cũng vì vậy mà phá hỏng thân thể mong manh.",rarity:"Sử thi",icon:(0,i.jsx)(F,{className:'w-8 h-8 text-teal-400'}),stats:[{name:"Ý chí",value:9},{name:"Thể chất",value:-8}]},{id:'beep_chitrin_3',title:"Bậc thầy tìm đường AI",description:"Bạn luôn tìm được “lời giải tối ưu” của bản đồ, di chuyển tốc độ cao bằng bước chân quỷ dị, nhưng cảm giác phi nhân ấy khiến bạn sinh ra trở ngại xã giao nghiêm trọng.",rarity:"Hiếm",icon:(0,i.jsx)(k,{className:'w-8 h-8 text-emerald-400'}),stats:[{name:"Nhanh nhẹn",value:9},{name:"Sức hút",value:-8}]},{id:'beep_1',title:"Ninja giấy hoang địa",description:"Tốc độ của bạn nhanh như quỷ mị, như ạo của bạn là sắc màu tươi sáng duy nhất trên hoang địa này, ai gặp cũng yêu, nhưng thân thể cũng yếu ớt như hoa trong nhà kính, dính chút mưa axit có thể chết ngay tại chỗ.",rarity:"Sử thi",icon:(0,i.jsx)(S,{className:'w-8 h-8 text-lime-200'}),stats:[{name:"Sức hút",value:9},{name:"Thể chất",value:-10}]},{id:'beep_4',title:"Vua đa cấp Hive",description:"Tài ăn nói của bạn sánh với thương nhân Hive đỉnh cấp nhất, có thể bán cát cho cướp cát, nhưng lòng tự tôn mỏng như thủy tinh, một câu nặng lời cũng đủ khiến bạn sụp đổ.",rarity:"Hiếm",icon:(0,i.jsx)(k,{className:'w-8 h-8 text-green-500'}),stats:[{name:"Sức hút",value:10},{name:"Ý chí",value:-8}]},{id:'beep_5',title:"Kẻ tiên tri load save",description:"Bạn dường như có thể thấy trước tương lai trước khi “load save” để tránh nguy hiểm, nhưng cũng vì thế mà rất ỷ lại “SL đại pháp”, hễ hơi không thuận là muốn bỏ cuộc.",rarity:"Truyền thuyết",icon:(0,i.jsx)(f,{className:'w-8 h-8 text-lime-400'}),stats:[{name:"Cảm nhận",value:10},{name:"Ý chí",value:-10}]},{id:'beep_6',title:"Tự tin bí ẩn",description:"Lòng dũng cảm tuyệt luân lĩnh ngộ từ Beep. Dù đối mặt kẻ địch mạnh nhất, bạn vẫn có thể tin chắc bản thân vô địch thiên hạ và đường hoàng tuyên bố điều đó; khí thế ngông cuồng khó tin này sẽ cưỡng ép can thiệp lý trí đối thủ, khiến đối phương đầy mặt bối rối và sinh ra chần chừ chiến thuật.",rarity:"Truyền thuyết",icon:(0,i.jsx)(P,{className:'w-8 h-8 text-green-400'}),stats:[{name:"Sức hút",value:12},{name:"Trí tuệ",value:-12}]},{id:'beep_7',title:"“Nhìn kìa, có cục sắt to!”",description:"Ngay khoảnh khắc đao kiếm giằng co căng nhất, bạn bất ngờ chỉ tay ra sau lưng đối thủ, mặt lộ vẻ kinh ngạc sống động và hét có chuyện. Vì diễn quá đạt, một số kẻ địch sẽ ngu ngốc phân tâm và cố quay đầu nhìn.",rarity:"Thường",icon:(0,i.jsx)(P,{className:'w-8 h-8 text-green-300'}),stats:[{name:"Sức hút",value:5}]},{id:'beep_8',title:"Bước ngang khéo ngã",description:"Khi xoay chuyển đao pháp hoặc lùi tránh chiến thuật, vì bộ pháp rối loạn mà bạn cực kỳ chật vật vấp ngã về phía trước. Nhưng tư thế ngã hài hước và bất ngờ ấy lại thường kỳ diệu lệch đầu khỏi trọng trảm chí mạng, thậm chí vừa khéo ngã ra ngáng chân kẻ địch mạnh đang đuổi gấp.",rarity:"Thường",icon:(0,i.jsx)(k,{className:'w-8 h-8 text-lime-300'}),stats:[{name:"Nhanh nhẹn",value:5}]},{id:'beep_9',title:"Hư thế chí cường",description:"Phô trương bày ra thế khởi thủ của võ học chí cường đầy uy nghi thần bí. Dùng ngạo khí chí cường ngông nghênh chấn nhiếp và hút toàn bộ ánh nhìn của địch, khiến đối phương không nắm được hư thực và không dám dễ dàng ra tay.",rarity:"Sử thi",icon:(0,i.jsx)(P,{className:'w-8 h-8 text-lime-400'}),stats:[{name:"Sức hút",value:8},{name:"Nhanh nhẹn",value:6}]},{id:'beep_10',title:"Vũ điệu bản năng điên ma loạn trận",description:"Ở khoảnh khắc cực hiểm không còn đường lui, bạn kích phát kiểu vung loạn tự vệ từ hoảng hốt thuần túy nhất. Nhắm chặt hai mắt, liều mạng xoay binh khí trong tay như cối xay gió, vung cuồng không bài bản; ngay cả bạn cũng hoàn toàn không biết tấc tiếp theo chém về đâu, khiến cả võ học tông sư cũng thường không cách nào phân giải ứng đối.",rarity:"Truyền thuyết",icon:(0,i.jsx)(D,{className:'w-8 h-8 text-green-500'}),stats:[{name:"Nhanh nhẹn",value:15},{name:"Sức hút",value:5}]},{id:'beep_11',title:"Sức mạnh nguyên tố của phù phép sư",description:"Khi vung hoặc bắn vũ khí, nhiều hiệu ứng vệt đuôi nguyên tố ngầu như liệt diễm, sấm điện, băng sương sẽ tự động ngẫu nhiên kích phát. Tuy hoàn toàn không gây thêm sát thương, nhưng mức độ ra vẻ có thể nói là hạng nhất. Uy hiếp tăng lên, đối phương cũng dễ bị ảo ảnh chói mắt phân tán chú ý hơn.",rarity:"Sử thi",icon:(0,i.jsx)(E,{className:'w-8 h-8 text-lime-400'}),stats:[{name:"Sức hút",value:7},{name:"Cảm nhận",value:3},{name:"Ý chí",value:-2}]},{id:'beep_12',title:"Người sống sót tự mang BGM",description:"Bạn làm việc gì cũng tự mang nhạc nền. Dù là chiến đấu chiếm ưu thế, sự kiện sắc tình, tình tiết bi thương, nhặt được đồ tốt hay yêu người khác, BGM và tiếng hát tương ứng đều vang lên, hơn nữa ai cũng nghe thấy.",rarity:"Thường",icon:(0,i.jsx)(k,{className:'w-8 h-8 text-green-400'}),stats:[{name:"Nhanh nhẹn",value:3},{name:"Sức hút",value:4},{name:"Trí tuệ",value:-2}]},{id:'beep_13',title:"VIP đỉnh cấp của Hive",description:"Bạn có quan hệ khó nói rõ với tuyến thương mại Hive, đi đâu cũng như khách quen. Đàm phán thuận hơn, nhưng cũng dễ bị xem là con mồi béo bở.",rarity:"Thường",icon:(0,i.jsx)(w,{className:'w-8 h-8 text-lime-300'}),stats:[{name:"Sức hút",value:4},{name:"Trí tuệ",value:1},{name:"Thể chất",value:-2}]},{id:'beep_14',title:"Hào quang siêu độ vật lý",description:"Bạn hiểu “siêu độ” thành khuyên nhủ vật lý cường độ cao. Đòn vung có áp lực hơn, nhưng năng lực thuyết phục không vì vậy mà tăng.",rarity:"Sử thi",icon:(0,i.jsx)(F,{className:'w-8 h-8 text-green-500'}),stats:[{name:"Sức mạnh",value:6},{name:"Ý chí",value:1},{name:"Sức hút",value:-2}]},{id:'beep_15',title:"Túi dị thứ nguyên",description:"Đáy ba lô của bạn như nối với một bãi rác dị thứ nguyên kỳ lạ. Thỉnh thoảng bạn tìm thấy trong túi vài vật phẩm vô lý và chẳng có giá trị, như thư tình màu hồng của một thánh kỵ sĩ nào đó, hoặc vật phẩm vốn không thuộc về thế giới này; nhưng độ tập trung sẽ bị tạp niệm kéo thấp.",rarity:"Thường",icon:(0,i.jsx)(N,{className:'w-8 h-8 text-lime-400'}),stats:[{name:"Cảm nhận",value:4},{name:"Trí tuệ",value:4},{name:"Ý chí",value:-4}]},{id:'beep_21',title:"Giao tiếp động vật",description:"Động vật đều thích bạn, và bạn có thể giao tiếp với chúng. Ngay cả thú mỏ, chó hoang và chim săn đầm lầy cũng có thể trở thành bạn bè kỳ lạ chủ động bảo vệ bạn, chiến đấu vì bạn; hai bên hiểu được lời nhau.",rarity:"Sử thi",icon:(0,i.jsx)(w,{className:'w-8 h-8 text-lime-300'}),stats:[{name:"Cảm nhận",value:4},{name:"Sức hút",value:15}]},{id:'beep_22',title:"Đại sư món ăn bóng tối",description:"Món bạn nấu có vẻ ngoài dữ tợn, mùi vị quỷ dị, bưng lên bàn như sản phẩm thí nghiệm thất bại vừa vớt khỏi bể axit. Nhưng chỉ cần lấy c :"Trí tuệ",value:-1}]}]},{id:'ken',name:"Ken",title:"Thần Hồi ức",description:"Cấy vào bạn một đoạn quá khứ ly kỳ không hề tồn tại, giúp bạn nắm được năng lực tương ứng.",fullDescription:"Ký ức giả cũng là ký ức, miễn là bạn tin chắc không nghi ngờ. Ken sẽ cưỡng ép nhét vào đầu bạn từng đoạn quá khứ hoang đường nhưng chân thật đến lạ. Bạn sẽ kế thừa thói quen cơ bắp và năng lực đặc biệt mà những “ký ức” ấy mang lại; tất nhiên cũng bao gồm sang chấn tinh thần và tính cách méo mó do chúng gây ra.",colorFrom:'from-blue-900',colorTo:'to-cyan-400',borderGlow:'hover:border-cyan-400',bgGlow:'bg-blue-950/30',icon:(0,i.jsx)(k,{className:'w-12 h-12 text-cyan-400'}),blessings:[{id:'ken_1',title:"Bao cát tối thượng ở Rebirth",description:"Bạn nhớ rằng bản thân từng làm nô lệ mười năm ở Rebirth; da bạn bị đánh dày hơn cả áo giáp, nhưng những năm dài bị đòn cũng khiến khớp cứng đờ, động tác chậm chạp.",rarity:"Hiếm",icon:(0,i.jsx)(g,{className:'w-8 h-8 text-blue-300'}),stats:[{name:"Thể chất",value:10},{name:"Nhanh nhẹn",value:-9}]},{id:'ken_2',title:"Vận động viên marathon vác xác",description:"Trong đầu bạn đầy ký ức giả khó hiểu về “cách luyện cấp bằng vác xác”. Bạn có sức mạnh như quái vật, nhưng lại thành thói quen cúi đầu nhìn dưới chân, thường không thấy nguy hiểm xung quanh.",rarity:"Hiếm",icon:(0,i.jsx)(k,{className:'w-8 h-8 text-cyan-300'}),stats:[{name:"Sức mạnh",value:9},{name:"Cảm nhận",value:-8}]},{id:'ken_3',title:"Học đồ cuồng nhiệt của Skinhouse",description:"Trong đầu xoáy quanh ký ức kinh dị từng lột chế “áo da người” ở Skinhouse. Bạn kế thừa kỹ thuật thành thạo về da ngoài sinh vật và giải phẫu khớp, trong chiến đấu luôn có thể lạnh lùng tháo cắt chính xác theo khe giáp và góc chết chịu lực cơ bắp của kẻ địch. Cái giá là chấp niệm này khiến thần sắc bạn quỷ dị.",rarity:"Sử thi",icon:(0,i.jsx)(M,{className:'w-8 h-8 text-cyan-400'}),stats:[{name:"Nhanh nhẹn",value:12},{name:"Trí tuệ",value:10},{name:"Sức hút",value:-15}]},{id:'ken_4',title:"Thần cờ bạc nghìn thắ
